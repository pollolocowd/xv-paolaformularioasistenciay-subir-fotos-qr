
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Digital</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

html{ scroll-behavior:smooth; }

body{
  background:#000;
  display:flex;
  justify-content:center;
}

.contenedor{
  max-width:430px;
  width:100%;
}

.bloque img{
  width:100%;
  display:block;
}

/* BOTÓN AUDIO */
.audio-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(145deg,#ff6bd6,#ff1aa3);
  box-shadow:0 10px 20px rgba(0,0,0,0.6),
             inset 0 -4px 8px rgba(255,255,255,0.35),
             inset 0 4px 6px rgba(0,0,0,0.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:#fff;
  cursor:pointer;
  z-index:999;
}

/* EFECTO SCROLL */
.bloque{
  opacity:0;
  transform:translateY(40px) scale(.98);
  transition:.9s cubic-bezier(.19,1,.22,1);
}

.bloque.visible{
  opacity:1;
  transform:translateY(0) scale(1);
}

.bloque:first-child{
  opacity:1 !important;
  transform:none !important;
}

/* TEXTO BLOQUE 2 */
.bloque-btn,
.bloque-reflejo{
  position:relative;
  overflow:hidden;
}

.bloque-btn::after,
.bloque-reflejo::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:50%;
  height:100%;
  background:linear-gradient(
    120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.30) 50%,
    rgba(255,255,255,0) 100%
  );
  transform:translateX(-150%) skewX(-20deg);
  pointer-events:none;
  animation:shine 3s ease-in-out infinite;
}
@keyframes shine{
  0%{
    transform:translateX(-150%) skewX(-20deg);
    opacity:0;
  }
  20%{
    opacity:1;
  }
  60%{
    transform:translateX(250%) skewX(-20deg);
    opacity:0;
  }
  100%{
    transform:translateX(250%) skewX(-20deg);
    opacity:0;
  }
}

.texto-boton{
  position:absolute;
  left:50%;
  top:84%;
  transform:translate(-50%,-50%);
  width:72%;
  text-align:center;
  font-size:16px;
  line-height:1.35;
  color:#5a2a3a;
  font-weight:500;
  pointer-events:none;
}

.texto-boton span{ display:block; }

/* PARTICULAS */
.bloque-particulas,
.bloque-particulas-xv,
.bloque-contador{
  position:relative;
}

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

/* CONTADOR */
.countdown{
  position:absolute;
  bottom:14%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:5;
}

.time-box{
  width:68px;
  height:78px;
  background:linear-gradient(145deg,#ff86cf,#ff3fa7);
  border-radius:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#fff;
  box-shadow:0 0 18px rgba(255,0,170,.6);
  animation:floatPink 3s ease-in-out infinite;
}

.time-box span{
  font-size:26px;
  font-weight:700;
}

.time-box small{
  font-size:11px;
}

@keyframes floatPink{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}

/* BLOQUE 5 ESTRELLAS */
.bloque-estrellas{
  position:relative;
  overflow:hidden;
}

.estrella{
  position:absolute;
  width:8px;
  height:8px;
  background:radial-gradient(circle,
    rgba(255,255,180,1) 0%,
    rgba(255,215,0,0.9) 40%,
    rgba(255,215,0,0.2) 70%,
    transparent 100%);
  border-radius:50%;
  box-shadow:0 0 8px rgba(255,215,0,0.9);
  animation:destello 2.5s ease-in-out infinite;
}

/* Posiciones */
.e1{ top:20%; left:25%; animation-delay:0s; }
.e2{ top:35%; right:20%; animation-delay:.6s; }
.e3{ bottom:30%; left:30%; animation-delay:1.2s; }
.e4{ bottom:20%; right:25%; animation-delay:1.8s; }

@keyframes destello{
  0%,100%{
    transform:scale(0.6);
    opacity:0.4;
  }
  50%{
    transform:scale(1.4);
    opacity:1;
  }
}

.bloque-ubicacion{
  position:relative;
}

.btn-ubicacion{
  position:absolute;
  padding:10px 18px;
  background:linear-gradient(145deg,#ff86cf,#ff3fa7);
  color:#fff;
  font-weight:600;
  border-radius:12px;
  text-decoration:none;
  box-shadow:0 4px 12px rgba(255,0,170,0.5);
  transition:transform .3s, box-shadow .3s;
  font-size:14px;
}

.btn-ubicacion:hover{
  transform:scale(1.1);
  box-shadow:0 6px 18px rgba(255,0,170,0.7);
}

.btn-parroquia{
  top: 45%;       /* Baja el botón */
  left: 50%;      /* Lo centra horizontalmente */
  transform: translate(-50%, -55%); /* Ajusta el centro exacto */
}

.btn-salon{
  top: 95%;       /* Ajusta para bajarlo o subirlo según se vea bien */
  left: 50%;      /* Lo centra horizontalmente */
  transform: translate(-50%, -60%); /* Centra el botón exacto */
}

/* BLOQUE 9 */
.bloque-acordeon{
  position:relative;
  overflow:hidden;
}

/* BOTÓN 3D */
.btn-datos{
  position:absolute;
  bottom:60%;
  left:50%;
  transform:translateX(-50%);
  padding:14px 28px;
  background:linear-gradient(145deg,#ff86cf,#ff3fa7);
  color:#fff;
  font-weight:700;
  border-radius:16px;
  cursor:pointer;
  box-shadow:
    0 8px 0 #c21875,
    0 12px 20px rgba(255,0,170,0.5);
  transition:.2s;
  display:flex;
  align-items:center;
  gap:8px;
}

/* Efecto presionado */
.btn-datos:active{
  transform:translateX(-50%) translateY(6px);
  box-shadow:
    0 2px 0 #c21875,
    0 6px 12px rgba(255,0,170,0.4);
}

/* Flecha animada */
.flecha{
  font-size:14px;
  animation:rebote 1.2s infinite;
}

@keyframes rebote{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(4px); }
}

/* PANEL ACORDEÓN */
.panel-datos{
  position:absolute;
  bottom:5%;
  left:50%;
  transform:translateX(-50%);
  width:85%;
  background:rgba(255,255,255,0.95);
  border-radius:18px;
  padding:0 20px;
  max-height:0;
  overflow:hidden;
  transition:max-height .5s ease, padding .4s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:left;
}

/* Cuando está activo */
.panel-datos.activo{
  max-height:200px;
  padding:20px;
}

</style>
</head>

<body>

<div class="contenedor">

<div class="bloque bloque-particulas">
  <img src="bloque1.webp">
  <canvas id="particulas"></canvas>
</div>

<div class="bloque bloque-btn">
  <img src="bloque2.webp">
  <div class="texto-boton">
    <span>Con mucho entusiasmo y alegría,</span>
    <span>los invitamos a celebrar</span>
    <span>el momento más especial</span>
    <span>de mi vida</span>
  </div>
</div>

<div class="bloque bloque-particulas-xv">
  <img src="bloque3.webp">
  <canvas id="particulasXV"></canvas>
</div>

<div class="bloque bloque-reflejo">
  <img src="bloque4.webp">
</div>

<div class="bloque bloque-estrellas">
  <img src="bloque5.webp">
  <span class="estrella e1"></span>
  <span class="estrella e2"></span>
  <span class="estrella e3"></span>
  <span class="estrella e4"></span>
</div>

<div class="bloque bloque-contador">
  <img src="bloque6.webp">

  <div class="countdown">
    <div class="time-box"><span id="dias">00</span><small>DÍAS</small></div>
    <div class="time-box"><span id="horas">00</span><small>HRS</small></div>
    <div class="time-box"><span id="minutos">00</span><small>MIN</small></div>
    <div class="time-box"><span id="segundos">00</span><small>SEG</small></div>
  </div>

  <canvas id="particulasCountdown"></canvas>
</div>

<div class="bloque bloque-ubicacion">
  <img src="bloque7.webp">

  <!-- Botones de ubicación -->
  <a href="https://maps.app.goo.gl/6C8YXR3zc164KboX6" target="_blank" class="btn-ubicacion btn-parroquia">
    Ubicacion
  </a>

  <a href="https://maps.app.goo.gl/sYFRkpUgoh5NBbeM9" target="_blank" class="btn-ubicacion btn-salon">
    Ubicacion
  </a>
</div>

<div class="bloque bloque-reflejo">
  <img src="bloque8.webp">
</div>
<div class="bloque bloque-acordeon">
  <img src="bloque9.webp">

  <!-- Botón 3D -->
  <div class="btn-datos" onclick="toggleDatos()">
    Toca aquí
    <span class="flecha">▼</span>
  </div>

  <!-- Ventana acordeón -->
  <div class="panel-datos" id="panelDatos">
    <p><strong>Beneficiario:</strong> María Fernanda López</p>
    <p><strong>Banco:</strong> BBVA Bancomer</p>
    <p><strong>Cuenta:</strong> 012345678901234567</p>
  </div>
</div>
<div class="bloque"><img src="bloque10.webp"></div>

<div class="bloque">
  <div style="padding:30px; background:#fff; text-align:center;">
    <h2 style="margin-bottom:15px; color:#ff3fa7;">Confirmar Asistencia</h2>

    <form id="formConfirmacion" style="display:flex; flex-direction:column; gap:10px;">
      <input type="text" id="nombre" placeholder="Tu nombre" required style="padding:10px;">
      <input type="tel" id="telefono" placeholder="Tu teléfono" required style="padding:10px;">

      <select id="estado" required style="padding:10px;">
        <option value="">¿Asistirás?</option>

      <input type="number" id="personas" placeholder="Número de personas" min="1" required style="padding:10px;">

        Confirmar
      </button>

</div>

<!-- BLOQUE MÁS OPCIONES (QR + Calendario) -->
<div class="bloque bloque-botones" style="text-align:center; padding:30px; background:#fff;">
  <h2 style="margin-bottom:15px; color:#ff3fa7;">Más opciones</h2>

  <!-- Botón QR -->
  <button id="btnQR" style="padding:12px 20px; margin:10px; background:#ff86cf; color:#fff; border:none; border-radius:8px; cursor:pointer;">
    Ver QR
  </button>

  <!-- Botón Calendario -->
  <a id="btnCalendario" href="#" target="_blank" style="padding:12px 20px; margin:10px; display:inline-block; background:#ff3fa7; color:#fff; border-radius:8px; text-decoration:none;">
    Agregar al calendario
  </a>

  <!-- Contenedor oculto para el QR -->
  <div id="contenedorQR" style="margin-top:15px; display:none;">
    <img id="imagenQR" src="" alt="QR Invitación" style="width:180px; height:180px;">
  </div>
</div>

</div>

<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="audio-btn" id="btnAudio">▶</div>

<script>
/* AUDIO */
const musica=document.getElementById("musica");
const btn=document.getElementById("btnAudio");
let activo=false;

btn.onclick=()=>{
  if(!activo){ musica.play(); btn.innerHTML="⏸"; activo=true; }
  else{ musica.pause(); btn.innerHTML="▶"; activo=false; }
};

/* SCROLL FIX REAL */
const bloques=document.querySelectorAll('.bloque');
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting)
      x.target.classList.add('visible');
  });
},{
  threshold:0,
  rootMargin:"0px 0px -80px 0px"
});

bloques.forEach(b=>obs.observe(b));
window.addEventListener("load",()=>{
  bloques.forEach(b=>{
    if(b.getBoundingClientRect().top<window.innerHeight*1.1)
      b.classList.add('visible');
  });
});

setTimeout(()=>{
  bloques.forEach(b=>b.classList.add('visible'));
},1200);

/* PARTICULAS BLOQUE 1 */
const c1=document.getElementById("particulas");
const x1=c1.getContext("2d");
function rs1(){c1.width=c1.offsetWidth;c1.height=c1.offsetHeight}
rs1();addEventListener("resize",rs1);

let p1=[];
for(let i=0;i<40;i++)p1.push({x:Math.random()*c1.width,y:Math.random()*c1.height,dx:(Math.random()-.5)*.6,dy:(Math.random()-.5)*.6,r:Math.random()*2+1,a:Math.random()});
function loop1(){
  x1.clearRect(0,0,c1.width,c1.height);
  p1.forEach(p=>{
    x1.beginPath();
    x1.arc(p.x,p.y,p.r,0,Math.PI*2);
    x1.fillStyle=`rgba(255,215,0,${p.a})`;
    x1.fill();
    p.x+=p.dx;p.y+=p.dy;
    if(p.x<0||p.x>c1.width)p.dx*=-1;
    if(p.y<0||p.y>c1.height)p.dy*=-1;
  });
  requestAnimationFrame(loop1);
}
loop1();

/* PARTICULAS BLOQUE 3 */
const cXV=document.getElementById("particulasXV");
const xXV=cXV.getContext("2d");
function rsXV(){cXV.width=cXV.offsetWidth;cXV.height=cXV.offsetHeight}
rsXV();addEventListener("resize",rsXV);

let pXV=[];
for(let i=0;i<30;i++)pXV.push({x:cXV.width/2,y:cXV.height/2,dx:(Math.random()-.5)*1.4,dy:(Math.random()-.5)*1.4,r:Math.random()*2+1,a:Math.random()});
function loopXV(){
  xXV.clearRect(0,0,cXV.width,cXV.height);

  pXV.forEach(p=>{
    xXV.beginPath();
    xXV.arc(p.x,p.y,p.r,0,Math.PI*2);
    xXV.fillStyle=`rgba(192,192,192,${p.a})`;
    xXV.fill();

    p.x += p.dx;
    p.y += p.dy;

    if(p.x < 0 || p.x > cXV.width) p.dx *= -1;
    if(p.y < 0 || p.y > cXV.height) p.dy *= -1;
  });

  requestAnimationFrame(loopXV);
}
loopXV();

/* CONTADOR */
const fechaEvento=new Date("2026-12-24T22:00:00").getTime();
setInterval(()=>{
  const d=Math.max(0,fechaEvento-Date.now());
  document.getElementById("dias").innerText=Math.floor(d/86400000).toString().padStart(2,"0");
  document.getElementById("horas").innerText=Math.floor(d/3600000)%24;
  document.getElementById("minutos").innerText=Math.floor(d/60000)%60;
  document.getElementById("segundos").innerText=Math.floor(d/1000)%60;
},1000);

/* PARTICULAS ROSAS CONTADOR */
const cC=document.getElementById("particulasCountdown");
const xC=cC.getContext("2d");
function rsC(){cC.width=cC.offsetWidth;cC.height=cC.offsetHeight}
rsC();addEventListener("resize",rsC);

let pC=[];
function spawn(){
  return{ x:cC.width/2+(Math.random()*200-100),
          y:cC.height*.75,
          dx:(Math.random()-.5)*1.2,
          dy:-Math.random()*2-1,
          r:Math.random()*2+1,
          a:1 };
}
function loopC(){
  xC.clearRect(0,0,cC.width,cC.height);
  if(pC.length<120)pC.push(spawn());
  pC.forEach((p,i)=>{
    xC.beginPath();
    xC.arc(p.x,p.y,p.r,0,Math.PI*2);
    xC.fillStyle=`rgba(255,80,180,${p.a})`;
    xC.fill();
    p.x+=p.dx;p.y+=p.dy;p.a-=.015;
    if(p.a<=0)pC.splice(i,1);
  });
  requestAnimationFrame(loopC);
}
loopC();

function toggleDatos(){
  const panel = document.getElementById("panelDatos");
  panel.classList.toggle("activo");
}

</script>

};

document.getElementById("formConfirmacion").addEventListener("submit", async (e) => {

  const nombre = document.getElementById("nombre").value;

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
  // QR
  const btnQR = document.getElementById("btnQR");
  const contQR = document.getElementById("contenedorQR");
  const imgQR = document.getElementById("imagenQR");

  btnQR.addEventListener("click", () => {
    const urlInvitacion = window.location.href; // tu invitación
    const qr = new QRious({ value: urlInvitacion, size: 180 });
    imgQR.src = qr.toDataURL();
    contQR.style.display = contQR.style.display === "none" ? "block" : "none";
  });

  // Calendario
  const btnCalendario = document.getElementById("btnCalendario");
  btnCalendario.addEventListener("click", () => {
    const start = "20261217T170000"; // fecha del evento
    const end = "20261217T230000";   // hora de fin (aprox)
    const title = "XV de Lupita";
    const details = "Celebración del XV de Lupita";
    const location = "Dirección del evento";

    const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${start}/${end}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(location)}`;
    btnCalendario.href = url;
  });
</script>
